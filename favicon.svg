<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Arquitetura — esquadro e compasso">
  <rect width="32" height="32" rx="8" fill="#2d2d2d"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Esquadro -->
    <path
      d="M5.5 24.5 L5.5 10.5 L18.5 24.5 Z"
      stroke="#c9a882"
      stroke-width="1.5"/>
    <!-- Compasso — pernas -->
    <path d="M18 8.5 L11.5 23.5" stroke="#a67c52" stroke-width="1.6"/>
    <path d="M18 8.5 L24.5 23.5" stroke="#a67c52" stroke-width="1.6"/>
    <path d="M18 8.5 L18 5" stroke="#a67c52" stroke-width="1.6"/>
    <!-- Compasso — arco -->
    <path d="M11.5 23.5 Q18 19.5 24.5 23.5" stroke="#a67c52" stroke-width="1.5"/>
    <!-- Articulação -->
    <circle cx="18" cy="8.5" r="1.4" fill="#a67c52" stroke="none"/>
  </g>
</svg>
